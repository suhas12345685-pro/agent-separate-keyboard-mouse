name: Publish to ClawHub

on:
  push:
    tags:
      - "v*"           # publish on version tags  e.g. v1.0.0
  workflow_dispatch:   # manual trigger from GitHub UI

permissions:
  contents: read

jobs:
  build-and-publish:
    runs-on: windows-latest   # Win32 plugin — keep native context

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build TypeScript
        run: npm run build

      - name: Install ClawHub CLI
        run: npm install -g clawhub-cli

      - name: Publish to ClawHub
        env:
          CLAWHUB_TOKEN: ${{ secrets.CLAWHUB_TOKEN }}
        run: clawhub publish . --token $env:CLAWHUB_TOKEN
